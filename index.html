<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Prediksi 4D Pro | Ensemble Engine</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css?v=3">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  
  <meta name="theme-color" content="#03050a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Prediksi 4D Pro">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

  <div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">INITIALIZING SYSTEM...</div>
  </div>

  <div class="result-panel" id="resultPanel">
    <div class="result-header">
      <div class="back-btn" onclick="closeResult()" aria-label="Kembali">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      </div>
      <div>
        <div class="result-title" id="resultTitle">LOADING...</div>
        <div class="result-subtitle" id="resultSubtitle">ANALYZING DATA STREAM</div>
      </div>
    </div>
    
    <div class="result-body" id="resultBody"></div>
  </div>

  <div class="history-page" id="historyPage">
    <div class="result-header">
      <div class="back-btn" onclick="closeHistoryPage()" aria-label="Kembali">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      </div>
      <div>
        <div class="result-title" id="historyTitle">RIWAYAT EVALUASI</div>
        <div class="result-subtitle">TRANSISI RESULT TERSIMPAN</div>
      </div>
    </div>
    <div class="history-page-body" id="historyPageBody"></div>
  </div>

  <div class="app">

    <div class="header">
      <div class="header-top">
        <div class="logo">PREDIKSI <span>4D</span> PRO</div>
        <div class="badge">ENSEMBLE ENGINE</div>
      </div>
      <div class="subtitle">Data-driven numerical analysis system</div>
    </div>

    <div class="search-wrap">
      <div class="search-wrap-inner">
        <span class="search-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </span>
        <input class="search-box" type="text" id="searchBox" 
          placeholder="Cari pasaran..." oninput="filterMarkets()" autocomplete="off">
      </div>
    </div>

    <div class="stats-row" id="statsRow" style="display:none">
      <div class="stat-chip">PASARAN: <span id="statTotal">0</span></div>
      <div class="stat-chip">LAST SYNC: <span id="statUpdated">00:00</span></div>
      <button class="sync-btn" id="syncBtn" onclick="refreshMarkets()" type="button">SYNC</button>
    </div>

    <div class="market-list" id="marketList">
      <div class="empty-state">
        <div class="spinner" style="width:24px; height:24px; margin: 0 auto 12px;"></div>
        ⏳ MENGHUBUNGKAN KE SERVER...
      </div>
    </div>

  </div>

  <script src="engine.js?v=2"></script>
  <script src="ui.js?v=3"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
